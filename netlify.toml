[build]
  base    = "client"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Proxy API calls to the Render backend so the client can keep using
# its relative "/api" base URL (see client/src/api/client.js).
[[redirects]]
  from   = "/api/*"
  to     = "https://travelz-z8jp.onrender.com/api/:splat"
  status = 200
  force  = true

# SPA fallback — every non-asset path serves index.html so the React
# app can handle client-side routing.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
